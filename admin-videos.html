<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Videos | BuscaEPP</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,sans-serif;background:#f5f5f5;color:#1a1a1a}
    .topbar{background:#0d6e56;color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
    .topbar h1{font-size:1rem;font-weight:600}
    .topbar span{font-size:.8rem;opacity:.75}
    .logout{background:rgba(255,255,255,.15);border:none;color:#fff;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:.8rem}
    .container{max-width:1000px;margin:2rem auto;padding:0 1rem}
    .panel{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:1.5rem;margin-bottom:2rem}
    .panel h2{font-size:1rem;font-weight:600;margin-bottom:1.25rem;color:#333}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .form-grid .full{grid-column:1/-1}
    label{display:block;font-size:.8rem;font-weight:600;color:#555;margin-bottom:4px}
    input,select,textarea{width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:.9rem;color:#1a1a1a;background:#fafafa;transition:border-color .15s}
    input:focus,select:focus,textarea:focus{outline:none;border-color:#0d6e56;background:#fff}
    textarea{resize:vertical;min-height:70px}
    .preview-thumb{margin-top:8px;border-radius:8px;overflow:hidden;max-width:240px}
    .preview-thumb img{width:100%;display:block}
    .btn-primary{background:#0d6e56;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:.9rem;font-weight:600;cursor:pointer;transition:background .15s}
    .btn-primary:hover{background:#085041}
    .btn-primary:disabled{background:#aaa;cursor:not-allowed}
    .btn-secondary{background:none;border:none;color:#888;cursor:pointer;font-size:.85rem;padding:10px 12px}
    .btn-danger{background:none;color:#c0392b;border:1px solid #c0392b;border-radius:6px;padding:4px 12px;font-size:.8rem;cursor:pointer}
    .btn-danger:hover{background:#fdf0f0}
    .alerta{padding:10px 14px;border-radius:8px;font-size:.875rem;margin-bottom:1rem;display:none}
    .alerta.ok{background:#e1f5ee;color:#0d6e56;display:block}
    .alerta.err{background:#fdf0f0;color:#c0392b;display:block}
    table{width:100%;border-collapse:collapse;font-size:.85rem}
    th{text-align:left;padding:8px 10px;border-bottom:2px solid #eee;color:#555;font-weight:600}
    td{padding:10px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
    tr:last-child td{border-bottom:none}
    .tag-mini{font-size:.75rem;padding:2px 8px;border-radius:99px;background:#e1f5ee;color:#0d6e56;font-weight:600;white-space:nowrap}
    .thumb-mini{width:80px;border-radius:4px}
    #login-screen{max-width:360px;margin:4rem auto;padding:2rem;background:#fff;border-radius:12px;border:1px solid #e0e0e0;text-align:center}
    #login-screen h2{font-size:1.1rem;margin-bottom:1.5rem}
    #login-screen input{margin-bottom:12px}
    .loader{color:#888;font-size:.9rem;padding:2rem;text-align:center}
    .acciones{display:flex;gap:6px}
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <h2>🔐 Admin — BuscaEPP</h2>
  <div><label>Correo</label><input type="email" id="email" placeholder="tu@correo.cl"></div>
  <div><label>Contraseña</label><input type="password" id="password"></div>
  <br>
  <button class="btn-primary" style="width:100%" id="btn-login">Ingresar</button>
  <p id="login-error" style="color:#c0392b;font-size:.8rem;margin-top:8px"></p>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <div class="topbar">
    <h1>Panel Admin — Biblioteca de Videos EPP</h1>
    <div style="display:flex;align-items:center;gap:12px">
      <span id="user-email"></span>
      <button class="logout" id="btn-logout">Salir</button>
    </div>
  </div>

  <div class="container">

    <!-- FORMULARIO -->
    <div class="panel">
      <h2 id="form-titulo-texto">➕ Agregar nuevo video</h2>
      <div id="alerta" class="alerta"></div>
      <div class="form-grid">
        <div>
          <label>ID de YouTube *</label>
          <input type="text" id="f-ytid" placeholder="ej: 4ymvWwkMDy0">
          <div class="preview-thumb" id="thumb-preview" style="display:none">
            <img id="thumb-img" src="" alt="preview">
          </div>
        </div>
        <div>
          <label>Categoría *</label>
          <select id="f-categoria">
            <option value="">— Selecciona —</option>
            <option>Uso general</option>
            <option>Trabajo en altura</option>
            <option>Protección cabeza</option>
            <option>Protección respiratoria</option>
            <option>Protección ocular</option>
            <option>Protección auditiva</option>
            <option>Guantes y manos</option>
            <option>Calzado de seguridad</option>
            <option>Ropa de trabajo</option>
          </select>
        </div>
        <div class="full">
          <label>Título del video *</label>
          <input type="text" id="f-titulo" placeholder="ej: Cómo usar arnés para trabajo en altura">
        </div>
        <div class="full">
          <label>Descripción breve</label>
          <textarea id="f-descripcion" placeholder="Resumen de lo que muestra el video…"></textarea>
        </div>
        <div>
          <label>Fuente / Canal</label>
          <input type="text" id="f-fuente" placeholder="ej: ACHS Chile">
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div>
            <label>Duración (opcional)</label>
            <input type="text" id="f-duracion" placeholder="ej: 4:32">
          </div>
          <div>
            <label>Orden (menor = primero)</label>
            <input type="number" id="f-orden" value="99" min="1" max="999">
          </div>
        </div>
      </div>
      <br>
      <input type="hidden" id="f-docid">
      <button class="btn-primary" id="btn-guardar">Guardar video</button>
      <button class="btn-secondary" id="btn-cancelar">Cancelar</button>
    </div>

    <!-- TABLA -->
    <div class="panel">
      <h2>📋 Videos publicados</h2>
      <div id="lista-loader" class="loader">Cargando…</div>
      <table id="tabla-videos" style="display:none">
        <thead>
          <tr>
            <th style="width:90px"></th>
            <th>Título</th>
            <th>Categoría</th>
            <th>Orden</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tabla-body"></tbody>
      </table>
    </div>

  </div>
</div>

<script type="module">
import { initializeApp }   from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc,
         doc, query, orderBy, serverTimestamp }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const app  = initializeApp({
  apiKey:            "AIzaSyAMaADj_7XN99vz2lkUtKDHTrumP2gEwPg",
  authDomain:        "buscaepp.firebaseapp.com",
  projectId:         "buscaepp",
  storageBucket:     "buscaepp.firebasestorage.app",
  messagingSenderId: "232178650803",
  appId:             "1:232178650803:web:385139e359827f120eaac6"
});
const auth = getAuth(app);
const db   = getFirestore(app);
const COL  = 'videos_epp';

// ── Auth ───────────────────────────────────────
onAuthStateChanged(auth, user => {
  if (user) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('user-email').textContent = user.email;
    cargarTabla();
  } else {
    document.getElementById('login-screen').style.display = 'block';
    document.getElementById('app').style.display = 'none';
  }
});

// ── Login ──────────────────────────────────────
document.getElementById('btn-login').addEventListener('click', async () => {
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('password').value;
  if (!email || !pass) {
    document.getElementById('login-error').textContent = 'Ingresa correo y contraseña.';
    return;
  }
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch(e) {
    document.getElementById('login-error').textContent = 'Correo o contraseña incorrectos.';
  }
});

document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btn-login').click();
});

document.getElementById('btn-logout').addEventListener('click', () => signOut(auth));

// ── Preview miniatura ──────────────────────────
document.getElementById('f-ytid').addEventListener('input', () => {
  const id   = document.getElementById('f-ytid').value.trim();
  const wrap = document.getElementById('thumb-preview');
  const img  = document.getElementById('thumb-img');
  if (id.length > 5) { img.src = `https://img.youtube.com/vi/${id}/mqdefault.jpg`; wrap.style.display='block'; }
  else wrap.style.display = 'none';
});

// ── Guardar ────────────────────────────────────
document.getElementById('btn-guardar').addEventListener('click', async () => {
  const ytid   = document.getElementById('f-ytid').value.trim();
  const titulo = document.getElementById('f-titulo').value.trim();
  const cat    = document.getElementById('f-categoria').value;
  const docid  = document.getElementById('f-docid').value;
  if (!ytid || !titulo || !cat) { mostrarAlerta('Completa los campos obligatorios (*).','err'); return; }
  const datos = {
    youtubeId:   ytid,
    titulo,
    categoria:   cat,
    descripcion: document.getElementById('f-descripcion').value.trim(),
    fuente:      document.getElementById('f-fuente').value.trim(),
    duracion:    document.getElementById('f-duracion').value.trim(),
    orden:       parseInt(document.getElementById('f-orden').value)||99,
    updatedAt:   serverTimestamp()
  };
  try {
    document.getElementById('btn-guardar').disabled = true;
    if (docid) {
      await updateDoc(doc(db, COL, docid), datos);
      mostrarAlerta('✅ Video actualizado correctamente.','ok');
    } else {
      datos.createdAt = serverTimestamp();
      await addDoc(collection(db, COL), datos);
      mostrarAlerta('✅ Video agregado correctamente.','ok');
    }
    limpiarForm(); cargarTabla();
  } catch(err) {
    mostrarAlerta('Error al guardar: '+err.message,'err');
  } finally {
    document.getElementById('btn-guardar').disabled = false;
  }
});

document.getElementById('btn-cancelar').addEventListener('click', limpiarForm);

// ── Tabla ──────────────────────────────────────
async function cargarTabla() {
  const loader = document.getElementById('lista-loader');
  const tabla  = document.getElementById('tabla-videos');
  const body   = document.getElementById('tabla-body');
  loader.style.display = 'block'; tabla.style.display = 'none'; body.innerHTML = '';
  const snap = await getDocs(query(collection(db,COL), orderBy('orden','asc')));
  if (snap.empty) { loader.textContent = 'No hay videos publicados aún.'; return; }
  snap.docs.forEach(d => {
    const v = d.data();
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><img class="thumb-mini" src="https://img.youtube.com/vi/${v.youtubeId}/mqdefault.jpg" alt=""></td>
      <td><strong>${v.titulo}</strong>${v.duracion?` <span style="color:#888;font-size:.78rem">(${v.duracion})</span>`:''}</td>
      <td><span class="tag-mini">${v.categoria}</span></td>
      <td>${v.orden}</td>
      <td class="acciones">
        <button class="btn-primary" style="padding:4px 12px;font-size:.8rem" data-edit="${d.id}">Editar</button>
        <button class="btn-danger" data-del="${d.id}" data-titulo="${v.titulo.replace(/"/g,'')}">Eliminar</button>
      </td>`;
    body.appendChild(tr);
  });
  loader.style.display = 'none'; tabla.style.display = 'table';

  // Listeners de editar/eliminar
  body.querySelectorAll('[data-edit]').forEach(btn =>
    btn.addEventListener('click', () => editarVideo(btn.dataset.edit)));
  body.querySelectorAll('[data-del]').forEach(btn =>
    btn.addEventListener('click', () => eliminarVideo(btn.dataset.del, btn.dataset.titulo)));
}

// ── Editar ─────────────────────────────────────
async function editarVideo(id) {
  const snap = await getDocs(query(collection(db,COL), orderBy('orden')));
  const d = snap.docs.find(x=>x.id===id); if (!d) return;
  const v = d.data();
  document.getElementById('f-docid').value       = id;
  document.getElementById('f-ytid').value        = v.youtubeId;
  document.getElementById('f-titulo').value      = v.titulo;
  document.getElementById('f-categoria').value   = v.categoria;
  document.getElementById('f-descripcion').value = v.descripcion||'';
  document.getElementById('f-fuente').value      = v.fuente||'';
  document.getElementById('f-duracion').value    = v.duracion||'';
  document.getElementById('f-orden').value       = v.orden||99;
  document.getElementById('form-titulo-texto').textContent = '✏️ Editar video';
  document.getElementById('btn-guardar').textContent = 'Actualizar video';
  const img = document.getElementById('thumb-img');
  img.src = `https://img.youtube.com/vi/${v.youtubeId}/mqdefault.jpg`;
  document.getElementById('thumb-preview').style.display = 'block';
  window.scrollTo({ top:0, behavior:'smooth' });
}

// ── Eliminar ───────────────────────────────────
async function eliminarVideo(id, titulo) {
  if (!confirm(`¿Eliminar "${titulo}"? Esta acción no se puede deshacer.`)) return;
  try {
    await deleteDoc(doc(db,COL,id));
    mostrarAlerta('Video eliminado.','ok');
    cargarTabla();
  } catch(err) { mostrarAlerta('Error: '+err.message,'err'); }
}

// ── Helpers ────────────────────────────────────
function limpiarForm() {
  ['f-docid','f-ytid','f-titulo','f-descripcion','f-fuente','f-duracion'].forEach(i=>document.getElementById(i).value='');
  document.getElementById('f-categoria').value = '';
  document.getElementById('f-orden').value = 99;
  document.getElementById('thumb-preview').style.display = 'none';
  document.getElementById('form-titulo-texto').textContent = '➕ Agregar nuevo video';
  document.getElementById('btn-guardar').textContent = 'Guardar video';
}

function mostrarAlerta(msg, tipo) {
  const el = document.getElementById('alerta');
  el.textContent = msg; el.className = 'alerta '+tipo;
  setTimeout(()=>el.className='alerta', 4000);
}
</script>
</body>
</html>
